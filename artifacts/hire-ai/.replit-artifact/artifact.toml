kind = "web"
previewPath = "/"
title = "HireAI — AI Interview Platform"
version = "1.0.0"
id = "artifacts/hire-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24282

[services.development]
run = "pnpm --filter @workspace/hire-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hire-ai", "run", "build" ]
publicDir = "artifacts/hire-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24282"
BASE_PATH = "/"
